<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multiple Choice Quiz</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg">
    <div id="ui-username" class="bg username-box">
      <div class="box bg">
        <p class="username-text">Enter Username:</p>
        <input type="text" id="username-box" class="username-input-box bg" />
        <button id="username-submit" class="button username-button">
          Start
        </button>
        <button id="username-leaderboard" class="button username-button-2">
          Leaderboard
        </button>
      </div>
    </div>
    <div id="ui-quiz" class="box hidden bg">
      <div class="card-body">
        <h1 class="card-title text-center">Quiz</h1>
      </div>
    </div>
    <div id="ui-result" class="hidden bg">
      <h2>&lt; Leaderboard &gt;</h2>
    </div>
    <script type="module" src="dist/main.js"></script>
  </body>
</html>
